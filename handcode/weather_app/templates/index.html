
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="weather-box">
            <div class="input-section">
                <div class="input-label">City Name</div>
                <form method="POST">
                    <input type="text" name="city" placeholder="Enter city name" required>
                    <button type="submit">Get Weather</button>
                </form>
                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}
            </div>
            {% if weather %}
            <div class="weather-info">
                <div class="weather-info">{{ weather.city }}</div>
                <img class="weather-icon" src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png" alt="Weather icon">
                <div class="weather-desc">{{ weather.description }}</div>
                <div class="temp">{{ weather.temperature }}°C</div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
